tool_slug: blender-cycles
tool_stack_id: blender:cycles@4.5
display_name: Blender Cycles renderer
versions:
  - version: "4.5"
    released: 2025-12-01
capabilities:
  - id: offline_photoreal_render
    bar_fit_default: HIGH
    bar_fit_evidence:
      - type: vendor_documentation
        source: https://docs.blender.org/manual/en/latest/render/cycles/index.html
        summary: Cycles is Blender's physically based path tracer for photoreal offline renders.
    known_ceilings:
      - Offline render quality does not automatically solve live WebGL runtime delivery.
  - id: cinematic_volumetric_render
    bar_fit_default: HIGH
    bar_fit_evidence:
      - type: pipeline_pattern
        source: render-fixture planning replay
        summary: Cycles can carry the offline bake side of a VDB-to-MP4 hybrid path that clears a high visual bar in runtime composition.
    known_ceilings:
      - Needs video-texture or equivalent runtime mounting to satisfy the continuous 3D world constraint.
