tool_slug: blender-mantaflow-flip
tool_stack_id: blender:mantaflow-flip@4.5
display_name: Blender Mantaflow FLIP liquid solver
versions:
  - version: "4.5"
    released: 2025-12-01
capabilities:
  - id: viscous_material_surface_simulation
    bar_fit_default: MEDIUM
    bar_fit_evidence:
      - type: vendor_documentation
        source: https://docs.blender.org/manual/en/latest/physics/fluid/type/domain/liquid/index.html
        summary: FLIP liquid solves support surface motion but require art direction for high-viscosity material reads.
    known_ceilings:
      - Viscous material crust turnover and blackbody-emissive shading are not turnkey.
  - id: cinematic_volumetric_render
    bar_fit_default: MEDIUM
    bar_fit_evidence:
      - type: project_observation
        source: render-fixture planning replay
        summary: Useful as one part of a free Blender path but not enough alone for feature-film material credibility.
    known_ceilings:
      - Solver output still needs Cycles shading, compositing, and WebGL delivery work to clear the bar.
constraints:
  os: [macos, linux, windows]
  arch: [arm64, x86_64]
  acquisition_cost_usd: 0
  recurrence: none
  license: gpl_v3
  local_runnable: true
  network_required: false
  credentials_required: false
acquisition:
  install_method: package_manager
  install_risk: low
  install_steps_summary: Install Blender with the platform package manager and run a minimal FLIP bake canary.
  canary_type: functional
  credentials_needed: []
  credential_handoff: none
